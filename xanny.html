<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XannyJuice | JuicedOut</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- CART -->
<div class="cart-icon" onclick="toggleCart()">
    🛒 <span id="cart-count">0</span>
</div>

<div id="cart" class="cart hidden">

    <h3>Warenkorb</h3>

    <div id="cart-items"></div>

    <p id="cart-total">Total: 0€</p>

    <button onclick="clearCart()">Leeren</button>

</div>

<!-- BACKGROUND -->
<div class="bg-logo"></div>

<!-- HEADER -->
<header>

<a href="index.html">
<img src="5270.png" class="logo" alt="JuicedOut Logo">
</a>

<h1>XannyJuice</h1>

<p>Choose your Juice</p>

</header>

<!-- PRODUCTS -->
<main>

<section class="products active">

    <div class="product-card">

        <h3>Xanny Chill</h3>
        <p>10ml</p>
        <span>24.99 €</span>

        <button onclick="addToCart('Xanny Chill', 24.99)">
            In den Warenkorb
        </button>

    </div>

    <div class="product-card">

        <h3>Xanny Max</h3>
        <p>20ml</p>
        <span>34.99 €</span>

        <button onclick="addToCart('Xanny Max', 34.99)">
            In den Warenkorb
        </button>

    </div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
