<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KratomJuice | JuicedOut</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- CART -->

<div class="cart-icon" onclick="toggleCart()">
    🛒 <span id="cart-count">0</span>
</div>

<div id="cart" class="cart-panel hidden">

    <div class="cart-header">
        <h3>Warenkorb</h3>
        <span onclick="toggleCart()" class="close-cart">✖</span>
    </div>

    <div id="cart-items"></div>

    <div class="cart-footer">
        <p id="cart-total">Total: 0€</p>
        <button onclick="clearCart()">Leeren</button>
    </div>

</div>

<div id="overlay" class="overlay hidden" onclick="toggleCart()"></div>

<!-- BACKGROUND -->
<div class="bg-logo"></div>

<!-- HEADER -->
<header>

<a href="index.html">
<img src="5270.png" class="logo" alt="JuicedOut Logo">
</a>

<h1>KratomJuice</h1>

<p>Choose your Juice</p>

</header>

<!-- PRODUCTS -->
<main>

<section class="products active">

    <div class="product-card">

        <h3>Kratom Green</h3>
        <p>10ml</p>
        <span>17.99 €</span>

        <button onclick="addToCart('Kratom Green', 17.99)">
            In den Warenkorb
        </button>

    </div>

    <div class="product-card">

        <h3>Kratom Gold</h3>
        <p>20ml</p>
        <span>27.99 €</span>

        <button onclick="addToCart('Kratom Gold', 27.99)">
            In den Warenkorb
        </button>

    </div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
