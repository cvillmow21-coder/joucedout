<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | JuicedOut</title>

<link rel="stylesheet" href="style.css">

<!-- PayPal SDK (paypal.me/CVHGW
) -->
<script src="https://www.paypal.com/sdk/js?client-id=DEINE_CLIENT_ID&currency=EUR"></script>

</head>

<body>

<!-- BACKGROUND -->
<div class="bg-logo"></div>

<header>
    <a href="index.html">
        <img src="5270.png" class="logo" alt="JuicedOut Logo">
    </a>
    <h1>Checkout</h1>
    <p>Bestellung abschließen</p>
</header>

<main style="max-width:800px;margin:0 auto;padding:20px;color:white;">

    <!-- WARENKORB ANZEIGE -->
    <section style="
        background:rgba(255,255,255,0.05);
        padding:20px;
        border-radius:12px;
        margin-bottom:20px;
    ">

        <h2>Dein Warenkorb</h2>

        <div id="checkout-items"></div>

        <hr style="margin:15px 0;opacity:0.2;">

        <h3 id="checkout-total">Total: €0.00</h3>

    </section>

    <!-- PAYPAL BUTTON -->
    <section style="
        background:rgba(255,255,255,0.05);
        padding:20px;
        border-radius:12px;
    ">

        <h2>Zahlung</h2>

        <div id="paypal-button-container"></div>

        <p style="opacity:0.6;font-size:14px;margin-top:10px;">
            Sichere Zahlung via PayPal
        </p>

    </section>

</main>

<!-- SCRIPT -->
<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    if (typeof loadCheckout === "function") {
        loadCheckout();
    }

    // PAYPAL BUTTON
    if (window.paypal) {

        paypal.Buttons({

            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        amount: {
                            value: window.cart
                                .reduce((s,i)=>s+i.price*i.qty,0)
                                .toFixed(2)
                        }
                    }]
                });
            },

            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {

                    if (typeof placeOrder === "function") {
                        placeOrder();
                    }

                });
            }

        }).render('#paypal-button-container');

    }
});
</script>

</body>
</html>
