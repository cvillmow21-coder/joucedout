<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | JuicedOut</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-logo"></div>

<header>

    <a href="index.html">
        <img src="5270.png" class="logo" alt="JuicedOut Logo">
    </a>

    <h1>Checkout</h1>

    <p>Bestellübersicht</p>

</header>

<main>
<div class="checkout-container">

    <h2>Deine Bestellung</h2>

    <div id="checkout-items"></div>

    <div class="checkout-summary">

        <p id="checkout-subtotal">Zwischensumme: €0.00</p>
        <p>Versand: €4.99</p>

        <hr>

        <h2 id="checkout-total">Total: €0.00</h2>

    </div>

    <button class="checkout-btn" onclick="placeOrder()">
        Bestellung abschließen
    </button>

</div>

    </div>

</main>

<script src="script.js"></script>

</body>
</html>
