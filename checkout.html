<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | JuicedOut</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-logo"></div>

<header>

    <a href="index.html">
        <img src="5270.png" class="logo" alt="JuicedOut Logo">
    </a>

    <h1>Checkout</h1>
<div class="checkout-form">

    <h2>Lieferadresse</h2>

    <input type="text" id="firstname" placeholder="Vorname" required>

    <input type="text" id="lastname" placeholder="Nachname" required>

    <input type="email" id="email" placeholder="E-Mail" required>

    <input type="tel" id="phone" placeholder="Telefon (optional)">

    <input type="text" id="street" placeholder="Straße" required>

    <input type="text" id="house" placeholder="Hausnummer" required>

    <input type="text" id="zip" placeholder="PLZ" required>

    <input type="text" id="city" placeholder="Ort" required>

    <h2>Zahlungsart</h2>

    <label>
        <input type="radio" name="payment" value="paypal" checked>
        PayPal
    </label>

    <label>
        <input type="radio" name="payment" value="bank">
        Vorkasse
    </label>

</div>
    <p>Bestellübersicht</p>

</header>

<main>
<div class="checkout-container">

    <h2>Deine Bestellung</h2>

    <div id="checkout-items"></div>

    <div class="checkout-summary">

        <p id="checkout-subtotal">Zwischensumme: €0.00</p>
        <p>Versand: €4.99</p>
<div class="discount-box">

    <input type="text" id="discount-code" placeholder="Gutscheincode">

    <button onclick="applyDiscount()">Einlösen</button>

</div>
        <hr>

        <h2 id="checkout-total">Total: €0.00</h2>

    </div>

    <button class="checkout-btn" onclick="placeOrder()">
        Bestellung abschließen
    </button>

</div>

    </div>

</main>

<script src="script.js"></script>

</body>
</html>
