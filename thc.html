<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THCJuice | JuicedOut</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- CART ICON -->
<div class="cart-icon" onclick="toggleCart()">
    🛒 <span id="cart-count">0</span>
</div>

<!-- CART PANEL -->
<div id="cart" class="cart-panel hidden">

    <div class="cart-header">
        <h3>Warenkorb</h3>
        <span onclick="closeCart()" class="close-cart">✖</span>
    </div>

    <div id="cart-items"></div>

    <div class="cart-footer">
        <p id="cart-total">Total: 0€</p>
        <button onclick="clearCart()">Leeren</button>
    </div>

</div>

<!-- OVERLAY (MUSS AUSSERHALB SEIN) -->
<div id="overlay" class="overlay hidden" onclick="closeCart()"></div>

<!-- BACKGROUND -->
<div class="bg-logo"></div>

<!-- HEADER -->
<header>

<a href="index.html">
<img src="5270.png" class="logo" alt="JuicedOut Logo">
</a>

<h1>THCJuice</h1>

<p>Choose your Juice</p>

</header>

<!-- PRODUCTS -->
<main>

<div class="products active">

    <div class="product-card">

        <h3>THC Juice Classic</h3>
        <p>10ml</p>
        <span>19.99 €</span>

        <button onclick="addToCart('THC Juice Classic', 19.99)">
            In den Warenkorb
        </button>

    </div>

    <div class="product-card">

        <h3>THC Juice Premium</h3>
        <p>20ml</p>
        <span>29.99 €</span>

        <button onclick="addToCart('THC Juice Premium', 29.99)">
            In den Warenkorb
        </button>

    </div>

</div>

</main>

<script src="script.js"></script>

</body>
</html>
