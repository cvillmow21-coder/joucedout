<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>JUICEDOUT Shop</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1b0b2e, #0b0f1a);
      color: white;
      overflow-x: hidden;
    }

    /* 🌈 BACKGROUND LOGO (zurück auf normal) */
    .bg-logo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: url("5270.png") no-repeat center;
      background-size: contain;
      width: 80%;
      height: 80%;
      opacity: 0.06;
      z-index: 0;
      pointer-events: none;
      filter: drop-shadow(0 0 40px #ff4fd8);
    }

    /* 🌸 SLOGAN */
    .hero {
      text-align: center;
      margin-top: 60px;
      position: relative;
      z-index: 2;
    }

    .hero h1 {
      font-size: 3.2rem;
      background: linear-gradient(90deg, #ff4fd8, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* 🧃 NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: rgba(20, 10, 40, 0.6);
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 2;
    }

    /* 🔥 LOGO OBEN LINKS (JETZT GRÖSSER) */
    .navbar img {
      height: 80px;   /* <- deutlich größer */
    }

    .navbar ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .navbar a:hover {
      color: #ff4fd8;
    }

    /* 🧃 PRODUKTE */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 25px;
      padding: 60px 30px;
      max-width: 1100px;
      margin: auto;
      position: relative;
      z-index: 2;
    }

    .product {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 79, 216, 0.3);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 18px;
      text-align: center;
      transition: 0.3s;
    }

    .product:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 40px rgba(255, 79, 216, 0.3);
    }

    .price {
      color: #ff4fd8;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 10px 14px;
      background: linear-gradient(90deg, #ff4fd8, #a855f7);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

      position: fixed;
      top: 15px
