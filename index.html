<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Mein Shop</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #111827;
      padding: 20px;
      text-align: center;
    }

    .cart {
      position: fixed;
      top: 15px;
      right: 15px;
      background: #1f2937;
      padding: 10px 15px;
      border-radius: 8px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 40px;
      max-width: 900px;
      margin: auto;
    }

    .product {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .price {
      color: #22c55e;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .cart-box {
      position: fixed;
      right: 15px;
      top: 60px;
      background: #0b1220;
      border: 1px solid #334155;
      width: 300px;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }

    .item {
      background: #1e293b;
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }

    .remove {
      background: red;
      border: none;
      color: white;
      padding: 3px 6px;
      border-radius: 5px;
      cursor: pointer;
    }

    .total {
      margin-top: 10px;
      font-weight: bold;
      color: #22c55e;
    }
  </style>
</head>

<body>

<header>
  <h1>🛒 Mein Shop</h1>
</header>

  <div id="items"></div>

</div>
