<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Mein Shop</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #111827;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-box {
      background: #1f2937;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 40px;
      max-width: 1000px;
      margin: auto;
    }

    .product {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .price {
      color: #22c55e;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    /* Warenkorb Panel */
    .cart-panel {
      position: fixed;
      right: -400px;
      top: 0;
      width: 350px;
      height: 100%;
      background: #0b1220;
      padding: 20px;
      transition: 0.3s;
      overflow-y: auto;
      border-left: 1px solid #334155;
    }

    .cart-panel.open {
      right: 0;
    }

    .cart-item {
      background: #1e293b;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
    }

    .remove {
      background: red;
      border: none;
      color: white;
      padding: 5px 8px;
      border-radius: 5px;
      cursor: pointer;
    }

    .checkout {
      margin-top: 20px;
      width: 100%;
      background: #22c55e;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <h1>🛒 Mein Shop</h1>
  <div class="cart-box" onclick="toggleCart()">
    Warenkorb 🛍️ (<span id="count">0</span>)
  </div>
</header>

<div class="container">

  <div class="product">
    <h3>Produkt 1</h3>
    <p class="price">€19.99</p>
    <button onclick="addItem('Produkt 1', 19.99)">Hinzufügen</button>
  </div>

  <div class="product">
    <h3>Produkt 2</h3>
    <p class="price">€29.99</p>
    <button onclick="addItem('Produkt 2', 29.99)">Hinzufügen</button>
  </div>

  <div class="product">
    <h3>Produkt 3</h3>
    <p class="price">€39.99</p>
    <button onclick="addItem('Produkt 3', 39.99)">Hinzufügen</button>
  </div>

</div>

<!-- Warenkorb -->
<div class="cart-panel" id="cart">
  <h2>Dein Warenkorb</h2>
  <div id="cart-items"></div>

  <h3 id="total">Gesamt: €0.00</h3>

  <button class="checkout" onclick="checkout()">Zur Kasse</button>
</div>

<script>
  let cart = [];

  function addItem(name, price) {
    cart.push({ name, price });
    updateCart();
  }

  function removeItem(index) {
    cart.splice(index, 1);
    updateCart();
  }

  function updateCart() {
    let list = document.getElementById("cart-items");
    let count = document.getElementById("count");
    let total = document.getElementById("total");

    list.innerHTML = "";

    let sum = 0;

    cart.forEach((item, i) => {
      sum += item.price;

      list.innerHTML += `
        <div class="cart-item">
          ${item.name} - €${item.price}
          <button class="remove" onclick="removeItem(${i})">X</button>
        </div>
      `;
    });

    count.innerText = cart.length;
    total.innerText = "Gesamt: €" + sum.toFixed(2);
  }
