<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Mein Shop</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #111827;
      padding: 20px;
      text-align: center;
    }

    .cart {
      position: fixed;
      top: 15px;
      right: 15px;
      background: #1f2937;
      padding: 10px 15px;
      border-radius: 8px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 40px;
      max-width: 900px;
      margin: auto;
    }

    .product {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .price {
      color: #22c55e;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .cart-box {
      position: fixed;
      right: 15px;
      top: 60px;
      background: #0b1220;
      border: 1px solid #334155;
      width: 320px;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }

    .item {
      background: #1e293b;
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }

    .remove {
      background: red;
      border: none;
      color: white;
      padding: 3px 6px;
      border-radius: 5px;
      cursor: pointer;
    }

    .total {
      margin-top: 10px;
      font-weight: bold;
      color: #22c55e;
    }
  </style>
</head>

<body>

<header>
  <h1>🛒 Mein Shop</h1>
</header>

<div class="cart">
  🛍️ Warenkorb (<span id="count">0</span>)
  <button onclick="toggleCart()">anzeigen</button>
</div>
<div class="cart-box" id="cartBox">
  <h3>Dein Warenkorb</h3>

  <div id="items"></div>

  <div class="total" id="total">Gesamt: €0.00</div>

  <button onclick="window.location.href='checkout.html'">
    Zur Kasse
  </button>
</div>

<div class="container">

  <div class="product">
    <h3>Produkt 1</h3>
    <p class="price">€19.99</p>
    <button onclick="add('Produkt 1', 19.99)">Hinzufügen</button>
  </div>

  <div class="product">
    <h3>Produkt 2</h3>
    <p class="price">€29.99</p>
    <button onclick="add('Produkt 2', 29.99)">Hinzufügen</button>
  </div>

  <div class="product">
    <h3>Produkt 3</h3>
    <p class="price">€39.99</p>
    <button onclick="add('Produkt 3', 39.99)">Hinzufügen</button>
  </div>

</div>

<script>
  let cart = [];

  // SAFE LOAD (verhindert Crash)
  window.onload = function () {
    try {
      let saved = localStorage.getItem("cart");
      if (saved) {
        cart = JSON.parse(saved);
        if (!Array.isArray(cart)) cart = [];
      }
    } catch (e) {
      cart = [];
      localStorage.removeItem("cart");
    }
    update();
  };

  function saveCart() {
    localStorage.setItem("cart", JSON.stringify(cart));
  }

  function add(name, price) {
    cart.push({ name, price });
    saveCart();
    update();
  }

  function remove(index) {
    cart.splice(index, 1);
    saveCart();
    update();
  }

  function update() {
    document.getElementById("count").innerText = cart.length;

    let box = document.getElementById("items");
    box.innerHTML = "";

    let total = 0;

    cart.forEach((item, index) => {
      let price = item.price || 0;
      total += price;

      box.innerHTML += `
        <div class="item">
          ${item.name || "Unbekannt"} - €${price.toFixed(2)}
          <button class="remove" onclick="remove(${index})">X</button>
        </div>
      `;
    });

    document.getElementById("total").innerText =
      "Gesamt: €" + total.toFixed(2);
  }

  function toggleCart() {
    let box = document.getElementById("cartBox");
    box.style.display = (box.style.display === "block") ? "none" : "block";
  }
</script>

</body>
</html>
