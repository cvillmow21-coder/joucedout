<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JuicedOut</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Background Logo -->
<div class="bg-logo"></div>

<!-- Header -->
<header class="hero">
    <h1>JuicedOut</h1>
    <p>sip a line and feel relaxed</p>
</header>

<!-- Categories -->
<section class="menu">

    <div class="card thc" onclick="toggle('thc')">
        <h2>THCJuice</h2>
        <span>ENTER SHOP</span>
    </div>

    <div class="card kratom" onclick="toggle('kratom')">
        <h2>KratomJuice</h2>
        <span>ENTER SHOP</span>
    </div>

    <div class="card xanny" onclick="toggle('xanny')">
        <h2>XannyJuice</h2>
        <span>ENTER SHOP</span>
    </div>

</section>

<!-- Dummy Sections (kommen später Produkte rein) -->
<div id="thc"></div>
<div id="kratom"></div>
<div id="xanny"></div>

<script src="script.js"></script>

</body>
</html>
