<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Mein Shop</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #111827;
      padding: 20px;
      text-align: center;
    }

    .cart {
      position: fixed;
      top: 15px;
      right: 15px;
      background: #1f2937;
      padding: 10px 15px;
      border-radius: 8px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 40px;
      max-width: 900px;
      margin: auto;
    }

    .product {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .price {
      color: #22c55e;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    /* Warenkorb Box */
    .cart-box {
      position: fixed;
      right: 15px;
      top: 60px;
      background: #0b1220;
      border: 1px solid #334155;
      width: 250px;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }

    .cart-box h3 {
      margin-top: 0;
    }

    .item {
      background: #1e293b;
      padding: 5px;
      margin: 5px 0;
      border-radius: 5px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h1>🛒 Mein Shop</h1>
</header>

<div class="cart">
  🛍️ Warenkorb (<span id="count">0</span>)
  <button onclick="toggleCart()">anzeigen</button>
</div>

<div class="cart-box" id="cartBox">
  <h3>Dein Warenkorb</h3>
  <div id="items"></div>
</div>

<div class="container">

  <div class="product">
    <h3>Produkt 1</h3>
    <p class="price">€19.99</p>
    <button onclick="add('Produkt 1')">Hinzufügen</button>
  </div>

  <div class="product">
    <h3>Produkt 2</h3>
    <p class="price">€29.99</p>
    <button onclick="add('Produkt 2')">Hinzufügen</button>
  </div>

  <div class="product">
    <h3>Produkt 3</h3>
    <p class="price">€39.99</p>
    <button onclick="add('Produkt 3')">Hinzufügen</button>
  </div>

</div>

<script>
  let cart = [];

  function add(name) {
    cart.push(name);
    update();
  }

  function update() {
    document.getElementById("count").innerText = cart.length;

    let box = document.getElementById("items");
    box.innerHTML = "";

    cart.forEach((item) => {
      box.innerHTML += `<div class="item">${item}</div>`;
    });
  }

  function toggleCart() {
    let box = document.getElementById("cartBox");
    if (box.style.display === "block") {
      box.style.display = "none";
    } else {
      box.style.display = "block";
    }
  }
</script>

</body>
</html>
