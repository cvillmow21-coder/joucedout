<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>JUICEDOUT Shop</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #120018, #05060a);
  color: white;
  overflow-x: hidden;
}

/* 🧪 DRIPPY GRAFFITI INTRO */
.syrup-overlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  overflow: hidden;
  background: linear-gradient(120deg, #ff00cc, #7a00ff, #ff4fd8);
}

/* große zähe “paint blobs” */
.syrup-overlay::before,
.syrup-overlay::after {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 20%, #ff00cc, transparent 40%),
              radial-gradient(circle at 70% 40%, #7a00ff, transparent 45%),
              radial-gradient(circle at 50% 80%, #ff4fd8, transparent 50%);
  filter: blur(30px);
  animation: blobMove 2s ease-in-out forwards;
}

/* drip lines */
.syrup-overlay::after {
  background:
    repeating-linear-gradient(
      180deg,
      rgba(255, 0, 204, 0.9) 0px,
      rgba(255, 0, 204, 0.9) 20px,
      transparent 20px,
      transparent 60px
    );
  mix-blend-mode: overlay;
  opacity: 0.8;
  animation: dripFall 2s ease-in-out forwards;
}

/* blob movement */
@keyframes blobMove {
  0% {
    transform: translateY(-30%) scale(1.2);
    opacity: 1;
  }
  50% {
    transform: translateY(0%) scale(1.1);
  }
  100% {
    transform: translateY(120%) scale(0.9);
    opacity: 0;
  }
}

/* dripping motion */
@keyframes dripFall {
  0% {
    transform: translateY(-100%);
    opacity: 1;
  }
  60% {
    transform: translateY(0%);
  }
  100% {
    transform: translateY(120%);
    opacity: 0;
  }
}

/* 🌈 BACKGROUND LOGO */
.bg-logo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80%;
  height: 80%;
  background: url("5270.png") no-repeat center;
  background-size: contain;
  opacity: 0.06;
  z-index: 0;
  pointer-events: none;
}

/* NAV */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
  position: relative;
  z-index: 2;
}

.navbar img {
  height: 80px;
}

.navbar ul {
  display: flex;
  list-style: none;
  gap: 20px;
}

.navbar a {
  color: white;
  text-decoration: none;
}

.navbar a:hover {
  color: #ff4fd8;
}

/* HERO */
.hero {
  text-align: center;
  margin-top: 50px;
  position: relative;
  z-index: 2;
}

.hero h1 {
  font-size: 3rem;
  background: linear-gradient(90deg, #ff00cc, #7a00ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* PRODUCTS */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 25px;
  padding: 60px 30px;
  max-width: 1100px;
  margin: auto;
  position: relative;
  z-index: 2;
}

.product {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,0,204,0.3);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  transition: 0.3s;
}

.product:hover {
  transform: translateY(-6px);
  box-shadow: 0 15px 40px rgba(255,0,204,0.3);
}
</style>
</head>

<body>

<!-- 🧪 DRIP INTRO -->
<div class="syrup-overlay"></div>

<!-- BACKGROUND LOGO -->
<div class="bg-logo"></div>

<!-- NAV -->
<nav class="navbar">
  <img src="5270.png">
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">Shop</a></li>
    <li><a href="checkout.html">Checkout</a></li>
  </ul>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>sip a line and feel relaxed</h1>
</div>

<!-- PRODUCTS -->
<div class="container">

  <div class="product">
    <h3>Produkt 1</h3>
    <p>€19.99</p>
  </div>

  <div class="product">
    <h3>Produkt 2</h3>
    <p>€29.99</p>
  </div>

  <div class="product">
    <h3>Produkt 3</h3>
    <p>€39.99</p>
  </div>

</div>

<script>
window.addEventListener("load", () => {
  setTimeout(() => {
    const overlay = document.querySelector(".syrup-overlay");
    if (overlay) overlay.remove();
  }, 2000);
});
</script>

</body>
</html>
