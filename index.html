<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Mein Shop</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #111827;
      padding: 20px;
      text-align: center;
      position: relative;
    }

    .cart {
      position: absolute;
      right: 20px;
      top: 20px;
      background: #1f2937;
      padding: 10px 15px;
      border-radius: 8px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 40px;
      max-width: 1000px;
      margin: auto;
    }

    .product {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .price {
      color: #22c55e;
      font-weight: bold;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn:hover {
      background: #2563eb;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<header>
  <h1>🛒 Mein Shop</h1>
  <div class="cart">
    🛍️ Warenkorb: <span id="cart-count">0</span>
  </div>
</header>

<div class="container">

  <div class="product">
    <h3>Produkt 1</h3>
    <p class="price">€19.99</p>
    <button class="btn" onclick="addToCart()">In den Warenkorb</button>
  </div>

  <div class="product">
    <h3>Produkt 2</h3>
    <p class="price">€29.99</p>
    <button class="btn" onclick="addToCart()">In den Warenkorb</button>
  </div>

  <div class="product">
    <h3>Produkt 3</h3>
    <p class="price">€39.99</p>
    <button class="btn" onclick="addToCart()">In den Warenkorb</button>
  </div>

</div>

<footer>
  © 2026 Mein Shop
</footer>

<script>
  let cart = 0;

  function addToCart() {
    cart++;
    document.getElementById("cart-count").innerText = cart;
  }
</script>

</body>
</html>
