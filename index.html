<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>JUICEDOUT Shop</title>

<style>
/* 🔥 HARD RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* 🚨 SAFE BACKGROUND (NIEMALS SCHWARZ) */
html, body {
  min-height: 100vh;
  width: 100%;
  font-family: Arial, sans-serif;

  background: #120018; /* fallback */
  background: radial-gradient(circle at top, #1b0b2e, #0b0f1a);
  color: white;
  overflow-x: hidden;
}

/* 🌈 BACKGROUND LOGO */
.bg-logo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80vw;
  height: 80vh;
  background: url("5270.png") no-repeat center;
  background-size: contain;
  opacity: 0.06;
  z-index: 0;
  pointer-events: none;
}

/* NAV */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(10px);
  position: relative;
  z-index: 10;
}

.navbar img {
  height: 80px;
}

/* HERO */
.hero {
  text-align: center;
  margin-top: 40px;
  position: relative;
  z-index: 2;
}

.hero h1 {
  font-size: 3rem;
  background: linear-gradient(90deg, #ff4fd8, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* CATEGORY */
.category {
  margin-top: 50px;
  position: relative;
  z-index: 2;
}

.category h2 {
  text-align: center;
  font-size: 2rem;
  margin-bottom: 20px;
  color: #ff4fd8;
}

/* PRODUCTS */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px 30px;
  max-width: 1000px;
  margin: auto;
  position: relative;
  z-index: 2;
}

/* PRODUCT CARD */
.product {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,79,216,0.3);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  transition: 0.3s;
}

.product:hover {
  transform: translateY(-6px);
  box-shadow: 0 10px 30px rgba(255,79,216,0.25);
}
