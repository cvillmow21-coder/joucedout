<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Meine Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    .container {
      padding: 100px 20px;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      color: #cbd5e1;
    }

    .button {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 25px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
    }

    .button:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Hallo 👋</h1>
    <p>Willkommen auf meiner ersten Website</p>

    <a class="button" href="https://github.com" target="_blank">
      Mein GitHub
    </a>
  </div>
</body>
</html>
