<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JuicedOut</title>

<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="cart" onclick="toggleCart()">
    🛒 <span id="count">0</span>
</div>

<div id="cartBox" class="cart-box">

    <h3>Warenkorb</h3>

    <div id="cartItemsSmall"></div>

    <a class="checkout-btn" href="checkout.html">
        Zum Checkout
    </a>

    <!-- Warenkorb Icon UNTER Button -->
    <div class="cart-icon-bottom" onclick="toggleCart()">
        🛒 <span id="count">0</span>
    </div>

</div>
<div class="bg-logo"></div>

<header class="hero">
    <h1>JuicedOut</h1>
    <p>sip a line and feel relaxed</p>
</header>

<section class="menu">

    <div class="card" onclick="toggle('thc')">
        <h2>THCJuice</h2>
        <span>ENTER SHOP</span>
    </div>

    <div class="card" onclick="toggle('kratom')">
        <h2>KratomJuice</h2>
        <span>ENTER SHOP</span>
    </div>

    <div class="card" onclick="toggle('xanny')">
        <h2>XannyJuice</h2>
        <span>ENTER SHOP</span>
    </div>

</section>

<section id="thc" class="shop-section">
    <h2>THCJuice</h2>

    <div class="products">
        <div class="product">
            <h3>THC Classic</h3>
            <p class="price">€19.99</p>
            <button onclick="addToCart('THC Classic', 19.99)">
    In den Warenkorb
</button>
        </div>
    </div>
</section>

<section id="kratom" class="shop-section">
    <h2>KratomJuice</h2>

    <div class="products">
        <div class="product">
            <h3>Kratom Green</h3>
            <p class="price">€22.99</p>
            <button onclick="addToCart('Kratom Green', 22.99)">
    In den Warenkorb
</button>
        </div>
    </div>
</section>

<section id="xanny" class="shop-section">
    <h2>XannyJuice</h2>

    <div class="products">
        <div class="product">
            <h3>Xanny Chill</h3>
            <p class="price">€29.99</p>
            <button onclick="addToCart('Xanny Chill', 29.99)">
    In den Warenkorb
</button>
        </div>
    </div>
</section>

<script src="script.js"></script>

</body>
</html>
