<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>JUICEDOUT Shop</title>

  <link rel="stylesheet" href="style.css">

  <style>
    /* alles was du vorher inline hattest bleibt hier */
    .cart {
      position: fixed;
      top: 15px;
      right: 15px;
      background: #1f2937;
      padding: 10px 15px;
      border-radius: 8px;
      color: white;
      z-index: 10;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 25px;
      padding: 60px 30px;
      max-width: 1100px;
      margin: auto;
      position: relative;
      z-index: 2;
    }

    .product {
      background: rgba(30, 41, 59, 0.9);
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      color: white;
      transition: 0.3s;
    }

    .product:hover {
      transform: translateY(-5px);
    }

    body {
      margin: 0;
      background: #0f172a;
      font-family: Arial, sans-serif;
    }

    header {
      text-align: center;
      padding: 20px;
      color: white;
      position: relative;
      z-index: 2;
    }

    .hero {
      text-align: center;
      margin-top: 40px;
      position: relative;
      z-index: 2;
    }

    .hero h1 {
      font-size: 3rem;
      color: white;
    }

    /* LOGO HINTERGRUND */
    .bg-logo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: url("5270.png") no-repeat center;
      background-size: contain;
      width: 70%;
      height: 70%;
      opacity: 0.06;
      z-index: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

<!-- HINTERGRUND LOGO (RICHTIG IM BODY!) -->
<div class="bg-logo"></div>

<nav class="navbar">
  <div class="logo">
    <img src="5270.png" alt="JUICEDOUT Logo" height="40">
  </div>

  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="#">Shop</a></li>
    <li><a href="#">Kontakt</a></li>
    <li><a href="checkout.html">Checkout</a></li>
  </ul>
</nav>

<div class="hero">
  <h1>sip a line and feel relaxed</h1>
</div>

<header>
  <h1>🛒 Mein Shop</h1>
</header>

<div class="cart">
  🛍️ Warenkorb (<span id="count">0</span>)
  <button onclick="toggleCart()">anzeigen</button>
</div>

<div class="cart-box" id="cartBox">
  <h3>Dein Warenkorb</h3>
  <div id="items"></div>
  <div class="total" id="total"></div>

  <button onclick="window.location.href='checkout.html'">
    Zur Kasse
  </button>
</div>

<div class="container">

  <div class="product">
    <h3>Produkt 1</h3>
    <p class="price">€19.99</p>
    <button onclick="add('Produkt 1', 19.99)">Hinzufügen</button>
  </div>

  <div class="product">
    <h3>Produkt 2</h3>
    <p class="price">€29.99</p>
    <button onclick="add('Produkt 2', 29.99)">Hinzufügen</button>
  </div>

  <div class="product">
    <h3>Produkt 3</h3>
    <p class="price">€39.99</p>
    <button onclick="add('Produkt 3', 39.99)">Hinzufügen</button>
  </div>

</div>

<script>
  let cart = [];

  function add(name, price) {
    cart.push({ name, price });
    update();
  }

  function remove(index) {
    cart.splice(index, 1);
    update();
  }

  function update() {
    document.getElementById("count").innerText = cart.length;

    let box = document.getElementById("items");
    box.innerHTML = "";

    let total = 0;

    cart.forEach((item, index) => {
      total += item.price;

      box.innerHTML += `
        <div class="item">
          ${item.name} - €${item.price.toFixed(2)}
          <button onclick="remove(${index})">X</button>
        </div>
      `;
    });

    document.getElementById("total").innerText =
      "Gesamt: €" + total.toFixed(2);
  }

  function toggleCart() {
    let box = document.getElementById("cartBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
  }
</script>

</body>
</html>
